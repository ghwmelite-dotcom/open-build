<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c9a5d"/>
      <stop offset="0.55" stop-color="#076b3f"/>
      <stop offset="1" stop-color="#03261a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FCD116" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FCD116" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#vig)"/>

  <!-- ring as a design element, right side -->
  <circle cx="1540" cy="540" r="300" fill="none" stroke="#FCD116" stroke-width="58"/>

  <!-- LIVE badge -->
  <g>
    <rect x="100" y="96" width="240" height="74" rx="37" fill="#CE1126"/>
    <circle cx="150" cy="133" r="15" fill="#ffffff"/>
    <text x="182" y="146" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="3">LIVE</text>
  </g>

  <!-- eyebrow -->
  <text x="104" y="360" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#FCD116" letter-spacing="8">OPEN BUILD · BUILT LIVE WITH CLAUDE CODE</text>

  <!-- headline -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="98" y="510" font-size="150" fill="#ffffff">Real problems,</text>
    <text x="98" y="668" font-size="150" fill="#FCD116">built live.</text>
  </g>

  <!-- sub -->
  <text x="104" y="752" font-family="Arial, Helvetica, sans-serif" font-size="44" fill="#cfe3d7">You name the problem — we build the tool, live on stream.</text>

  <!-- CTA -->
  <g>
    <rect x="100" y="820" width="560" height="92" rx="46" fill="#FCD116"/>
    <text x="380" y="880" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="#0a0e0c">🗳  Vote on what's next</text>
    <text x="690" y="880" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#ffffff">open-build.ohwpstudios.org</text>
  </g>

  <rect x="0" y="1062" width="1920" height="18" fill="#FCD116"/>
  <rect x="0" y="1062" width="1920" height="6" fill="#CE1126"/>
</svg>
